name: CI/CD NexaBank Digital Banking

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  build-backend:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, account-service, transaction-service, notification-service, api-gateway]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: mvn clean package -DskipTests -B
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: services/${{ matrix.service }}/target/*.jar
          retention-days: 1

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://nexabank-prod-api-gateway.azurewebsites.net
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 1

  deploy-backend:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [build-backend]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: user-service
            app-name: nexabank-prod-user-service
          - service: account-service
            app-name: nexabank-prod-account-service
          - service: transaction-service
            app-name: nexabank-prod-transaction-service
          - service: notification-service
            app-name: nexabank-prod-notification-service
          - service: api-gateway
            app-name: nexabank-prod-api-gateway
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ./jar
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy ${{ matrix.service }}
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ matrix.app-name }}
          package: ./jar

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./build
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy Frontend
        uses: azure/webapps-deploy@v3
        with:
          app-name: nexabank-prod-frontend
          package: ./build
