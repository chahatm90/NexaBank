server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlserver://nexabank-prod-sqlsvr.database.windows.net:1433;database=banking;encrypt=true;trustServerCertificate=true}
    username: ${SPRING_DATASOURCE_USERNAME:bankingadmin}
    password: ${SPRING_DATASOURCE_PASSWORD:NexaBank@2024!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
    show-sql: false
  jackson:
    default-property-inclusion: NON_NULL
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
logging:
  level:
    com.banking: DEBUG